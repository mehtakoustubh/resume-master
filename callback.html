<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticating...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-8 max-w-md w-full text-center fade-in">
        <div class="spinner mx-auto mb-6"></div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Authenticating...</h1>
        <p class="text-gray-600">Please wait while we verify your GitHub account</p>
        <div id="errorMessage" class="mt-4 hidden">
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-600 text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>
        </div>
        <div id="successMessage" class="mt-4 hidden text-green-600">
            <i class="fas fa-check-circle text-3xl"></i>
            <p class="mt-2 font-medium">Login successful!</p>
            <p class="text-sm text-gray-500">Redirecting to app...</p>
        </div>
    </div>

    <script>
        // ============ NEW GITHUB OAUTH CREDENTIALS ============
        const GITHUB_CLIENT_ID = 'Ov23liJgU37OwHPDdT1l';  // ← UPDATED
        const GITHUB_CLIENT_SECRET = '24b5e9033a16e581cdf93e9177b005470231a6ea';  // ← UPDATED
        const REDIRECT_URI = window.location.origin + '/callback.html';
        
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            if (error) {
                showError(`GitHub error: ${error}`);
                setTimeout(() => window.location.href = '/', 4000);
                return;
            }

            if (!code) {
                setTimeout(() => window.location.href = '/', 2000);
                return;
            }

            try {
                console.log('🔄 Exchanging code for token...');
                console.log('📡 Client ID:', GITHUB_CLIENT_ID);
                console.log('📡 Redirect URI:', REDIRECT_URI);
                
                // ============ OPTION 1: Try Netlify Function ============
                try {
                    const response = await fetch('/.netlify/functions/oauth', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            code: code,
                            redirect_uri: REDIRECT_URI
                        })
                    });

                    if (response.ok) {
                        const tokenData = await response.json();
                        
                        if (tokenData.error) {
                            throw new Error(tokenData.error_description || tokenData.error);
                        }

                        if (!tokenData.access_token) {
                            throw new Error('No access token received');
                        }

                        console.log('✅ Token received successfully via Netlify function');
                        const userData = await getUserInfo(tokenData.access_token);
                        handleSuccessfulLogin(tokenData.access_token, userData);
                        return;
                    }
                } catch (functionError) {
                    console.log('⚠️ Netlify function failed, falling back to direct call:', functionError.message);
                }

                // ============ OPTION 2: Direct GitHub API Call (Fallback) ============
                console.log('🔄 Using direct GitHub API call...');
                
                const response = await fetch('https://github.com/login/oauth/access_token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        client_id: GITHUB_CLIENT_ID,
                        client_secret: GITHUB_CLIENT_SECRET,
                        code: code,
                        redirect_uri: REDIRECT_URI
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const tokenData = await response.json();
                
                if (tokenData.error) {
                    throw new Error(tokenData.error_description || tokenData.error);
                }

                if (!tokenData.access_token) {
                    throw new Error('No access token received');
                }

                console.log('✅ Token received successfully via direct call');
                const userData = await getUserInfo(tokenData.access_token);
                handleSuccessfulLogin(tokenData.access_token, userData);

            } catch (error) {
                console.error('❌ Authentication error:', error);
                showError(error.message || 'Authentication failed. Please try again.');
                
                setTimeout(() => window.location.href = '/', 4000);
            }
        }

        async function getUserInfo(accessToken) {
            const userResponse = await fetch('https://api.github.com/user', {
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Accept': 'application/json'
                }
            });

            if (!userResponse.ok) {
                throw new Error(`Failed to get user info: ${userResponse.status}`);
            }

            return await userResponse.json();
        }

        function handleSuccessfulLogin(accessToken, userData) {
            console.log('👤 User authenticated:', userData.login);

            localStorage.setItem('github_token', accessToken);
            localStorage.setItem('github_user', JSON.stringify(userData));

            document.getElementById('successMessage').classList.remove('hidden');

            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        }

        function showError(message) {
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('errorText').textContent = message;
        }

        console.log('🔐 OAuth Callback Handler');
        console.log('📡 Client ID:', GITHUB_CLIENT_ID);
        console.log('📡 Redirect URI:', REDIRECT_URI);
        handleCallback();
    </script>
</body>
</html>
