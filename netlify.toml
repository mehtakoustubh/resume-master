[build]
  command = "echo 'No build needed'"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirects for API
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# OAuth callback
[[redirects]]
  from = "/callback.html"
  to = "/callback.html"
  status = 200
  force = true

# Catch all for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CORS headers
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"